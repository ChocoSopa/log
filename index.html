<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Quesito Radar Detector Mejorado</title>
<style>
  /* Reset body */
  body {
    margin: 0;
    height: 100vh;
    background: black;
    color: white;
    font-family: 'Trebuchet MS', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    padding: 10px;
  }

  /* Botones grandes, adaptativos */
  #startBtn, #resetBtn {
    padding: 16px 32px;
    font-size: 5vw;
    max-font-size: 28px;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    color: white;
    box-shadow: 0 0 15px #00ffcc;
    user-select: none;
    width: 90vw;
    max-width: 320px;
    margin-bottom: 15px;
    transition: background 0.3s, box-shadow 0.3s;
  }

  #startBtn {
    background: linear-gradient(45deg, #00ffcc, #0066ff);
    animation: pulse 2s infinite;
    position: relative;
    z-index: 10;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 15px #00ffcc; transform: scale(1); }
    50% { box-shadow: 0 0 35px #00ccff; transform: scale(1.1); }
  }

  #resetBtn {
    background: red;
    box-shadow: 0 0 15px #ff3333;
    z-index: 10;
    display: none;
  }

  /* Radar circular, responsive */
  #radar {
    width: 90vw;
    max-width: 400px;
    height: 90vw;
    max-height: 400px;
    border-radius: 50%;
    border: 3px solid #00ff66;
    background: radial-gradient(circle at center, rgba(0,255,100,0.2), rgba(0,0,0,0.9));
    overflow: hidden;
    box-shadow: 0 0 20px #00ff99;
    position: relative;
    margin-bottom: 20px;
    display: none;
  }

  /* Aguja centrada y proporcional */
  #needle {
    position: absolute;
    left: 50%;
    top: 0%;
    width: 1.5vw;
    max-width: 6px;
    height: 45vw;
    max-height: 190px;
    background: linear-gradient(180deg, #00ff66, transparent);
    transform-origin: bottom center;
    box-shadow:
      0 0 10px #00ff66,
      0 0 20px #00ff66,
      0 0 30px #00ff99;
    pointer-events: none;
    z-index: 5;
    transform: translate(-50%, 0);
  }
  #needle::before {
    content: '';
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 5vw;
    max-width: 15px;
    height: 1.5vw;
    max-height: 4px;
    background: #00ff66;
    filter: blur(6px);
    opacity: 0.6;
  }
  #needle::after {
    content: '';
    position: absolute;
    bottom: 4vw;
    max-bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 9vw;
    max-width: 30px;
    height: 1.5vw;
    max-height: 5px;
    background: #00ff99;
    filter: blur(10px);
    opacity: 0.3;
  }

  /* Quesitos tamaño adaptativo */
  .quesito {
    position: absolute;
    width: 10vw;
    max-width: 80px;
    height: 10vw;
    max-height: 80px;
    background-size: contain;
    background-repeat: no-repeat;
    opacity: 0;
    transition: all 0.8s ease-out;
    pointer-events: auto;
    cursor: default;
  }

  /* Quesito grande (alerta) tamaño adaptativo */
  #bigQuesito {
    display: none;
    position: fixed;
    left: 50%;
    top: 35vh;
    transform: translate(-50%, -50%) scale(0);
    width: 40vw;
    max-width: 150px;
    height: 40vw;
    max-height: 150px;
    background-size: contain;
    background-repeat: no-repeat;
    animation: grow 2s forwards;
    pointer-events: none;
    z-index: 20;
    filter: drop-shadow(0 0 10px #00ff66);
  }

  @keyframes grow {
    from { transform: translate(-50%, -50%) scale(0); opacity: 0; }
    to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  }

  /* Estilos para pantallas grandes */
  @media (min-width: 500px) {
    #startBtn, #resetBtn {
      width: 300px;
      font-size: 26px;
      padding: 20px 60px;
    }
    #radar {
      width: 400px;
      height: 400px;
    }
    #needle {
      width: 4px;
      height: 190px;
      top: 3%;
    }
    .quesito {
      width: 80px;
      height: 80px;
    }
    #bigQuesito {
      width: 150px;
      height: 150px;
      top: 30%;
    }
  }
</style>
</head>
<body>
<button id="startBtn">Scan Quesitos in your area</button>
<div id="radar">
  <div id="needle"></div>
</div>
<button id="resetBtn">¡ALERTA!</button>
<div id="bigQuesito"></div>

<!-- Audios -->
<audio id="scanSound" src="images/Audio_Scaner.MP3" loop></audio>
<audio id="detectorBeep" src="https://cdn.pixabay.com/audio/2022/03/15/audio_f499d8508.mp3"></audio>
<audio id="alertSound" src="images/MA_Originals_Various Alarms_Chaos Texture Alert.wav"></audio>

<script>
const startBtn = document.getElementById('startBtn');
const radar = document.getElementById('radar');
const resetBtn = document.getElementById('resetBtn');
const bigQuesito = document.getElementById('bigQuesito');
const scanSound = document.getElementById('scanSound');
const beep = document.getElementById('detectorBeep');
const alertSound = document.getElementById('alertSound');
const needle = document.getElementById('needle');

let active = false;
let quesitoTimer;
const totalQuesos = 6;
const imgs = Array.from({ length: totalQuesos }, (_, i) => `images/${i + 1}.png`);

function randomPos(radius) {
  const angle = Math.random() * Math.PI * 2;
  const r = Math.random() * (radius - 40);
  return {
    x: Math.cos(angle) * r + radius,
    y: Math.sin(angle) * r + radius
  };
}

function spawnQuesito() {
  const pos = randomPos(200);
  const img = imgs[Math.floor(Math.random() * totalQuesos)];
  const q = document.createElement('div');
  q.className = 'quesito';
  q.style.left = `${pos.x - 20}px`;
  q.style.top = `${pos.y - 20}px`;
  q.style.backgroundImage = `url(${img})`;
  radar.appendChild(q);
  setTimeout(() => {
    q.style.opacity = 1;
    beep.play();
  }, 200);
  setTimeout(() => {
    if (q.parentNode) q.remove();
  }, 3000);
}

function startScanning() {
  if (active) return;
  startBtn.style.display = 'none';
  radar.style.display = 'block';
  resetBtn.style.display = 'block';
  // Reproducir audio solo al hacer clic en botón
  scanSound.play().catch(e => {
    // En caso de bloqueo, se puede manejar o dejar en blanco
    console.log("Audio play prevented until user interaction");
  });
  active = true;

  quesitoTimer = setInterval(spawnQuesito, 3000);

  animateNeedle();
}

let startTime;
function animateNeedle(timestamp) {
  if (!startTime) startTime = timestamp;
  const elapsed = timestamp - startTime;
  const rotation = (elapsed / 3000) * 360;
  needle.style.transform = `rotate(${rotation}deg) translate(-50%, 0)`;
  if(active) {
    requestAnimationFrame(animateNeedle);
  } else {
    needle.style.transform = `translate(-50%, 0)`;
    startTime = null;
  }
}

let alertPlaying = false;

function resetRadar() {
  if (!alertPlaying) {
    clearInterval(quesitoTimer);
    scanSound.pause();
    alertSound.play();
    alertPlaying = true;

    const imgIndex = Math.floor(Math.random() * totalQuesos);
    bigQuesito.style.backgroundImage = `url(${imgs[imgIndex]})`;
    bigQuesito.style.display = 'block';
    bigQuesito.style.animation = 'grow 2s forwards';
    active = false;
  } else {
    alertSound.pause();
    alertSound.currentTime = 0;
    alertPlaying = false;

    bigQuesito.style.display = 'none';
    radar.style.display = 'block';
    scanSound.play().catch(e => {
      console.log("Audio play prevented until user interaction");
    });
    active = true;

    quesitoTimer = setInterval(spawnQuesito, 3000);
    requestAnimationFrame(animateNeedle);
  }
}

startBtn.addEventListener('click', startScanning);
resetBtn.addEventListener('click', resetRadar);
</script>
</body>
</html>
