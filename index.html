<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Quesito Radar Detector Mejorado</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    color: white;
    font-family: 'Trebuchet MS', sans-serif;
  }

  #startBtn {
    padding: 20px 60px;
    background: linear-gradient(45deg, #00ffcc, #0066ff);
    font-size: 26px;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    color: white;
    box-shadow: 0 0 15px #00ffcc;
    animation: pulse 2s infinite;
    z-index: 10;
    position: relative;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 15px #00ffcc; transform: scale(1); }
    50% { box-shadow: 0 0 35px #00ccff; transform: scale(1.1); }
  }

  #radar {
    display: none;
    position: relative;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    border: 3px solid #00ff66;
    background: radial-gradient(circle at center, rgba(0,255,100,0.2), rgba(0,0,0,0.9));
    overflow: hidden;
    box-shadow: 0 0 20px #00ff99;
  }

  #needle {
    position: absolute;
    left: 50%;
    top: 3%;
    width: 4px;
    height: 190px;
    background: linear-gradient(180deg, #00ff66, transparent);
    transform-origin: bottom center;
    box-shadow:
      0 0 10px #00ff66,
      0 0 20px #00ff66,
      0 0 30px #00ff99;
    pointer-events: none;
    z-index: 5;
    transform: translate(-50%, 0);
  }
  #needle::before {
    content: '';
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 15px;
    height: 4px;
    background: #00ff66;
    filter: blur(6px);
    opacity: 0.6;
  }
  #needle::after {
    content: '';
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 30px;
    height: 5px;
    background: #00ff99;
    filter: blur(10px);
    opacity: 0.3;
  }

  .quesito {
    position: absolute;
    width: 40px;
    height: 40px;
    background-size: contain;
    background-repeat: no-repeat;
    opacity: 0;
    transition: all 0.8s ease-out;
    pointer-events: auto;
    cursor: default;
  }

  #resetBtn {
    display: none;
    position: fixed;
    bottom: 20px;
    right: 20px;
    padding: 15px 25px;
    background: red;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 18px;
    cursor: pointer;
    box-shadow: 0 0 15px #ff3333;
    z-index: 10;
  }

  #bigQuesito {
    display: none;
    position: fixed;
    left: 50%;
    top: 40%;
    transform: translate(-50%, -50%) scale(0);
    width: 150px;
    height: 150px;
    background-size: contain;
    background-repeat: no-repeat;
    animation: grow 2s forwards;
    pointer-events: none;
    z-index: 20;
    filter: drop-shadow(0 0 10px #00ff66);
  }

  @keyframes grow {
    from { transform: translate(-50%, -50%) scale(0); opacity: 0; }
    to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  }
</style>
</head>
<body>
<button id="startBtn">Scan Quesitos in your area</button>
<div id="radar">
  <div id="needle"></div>
</div>
<button id="resetBtn">¡ALERTA!</button>
<div id="bigQuesito"></div>

<!-- Audios -->
<audio id="scanSound" src="https://cdn.pixabay.com/audio/2022/06/14/audio_123b6fa6e1.mp3" loop></audio>
<audio id="detectorBeep" src="https://cdn.pixabay.com/audio/2022/03/15/audio_f499d8508d.mp3"></audio>
<audio id="alertSound" src="images/MA_Originals_Various Alarms_Chaos Texture Alert.wav"></audio>

<script>
const startBtn = document.getElementById('startBtn');
const radar = document.getElementById('radar');
const resetBtn = document.getElementById('resetBtn');
const bigQuesito = document.getElementById('bigQuesito');
const scanSound = document.getElementById('scanSound');
const beep = document.getElementById('detectorBeep');
const alertSound = document.getElementById('alertSound');
const needle = document.getElementById('needle');

let active = false;
let quesitoTimer;
const totalQuesos = 6;
const imgs = Array.from({ length: totalQuesos }, (_, i) => `images/${i + 1}.png`);

function randomPos(radius) {
  const angle = Math.random() * Math.PI * 2;
  const r = Math.random() * (radius - 40);
  return {
    x: Math.cos(angle) * r + radius,
    y: Math.sin(angle) * r + radius
  };
}

function spawnQuesito() {
  const pos = randomPos(200);
  const img = imgs[Math.floor(Math.random() * totalQuesos)];
  const q = document.createElement('div');
  q.className = 'quesito';
  q.style.left = `${pos.x - 20}px`;
  q.style.top = `${pos.y - 20}px`;
  q.style.backgroundImage = `url(${img})`;
  radar.appendChild(q);
  setTimeout(() => {
    if (q.parentNode) {
      q.remove();
    }
  }, 3000);
  setTimeout(() => {
    q.style.opacity = 1;
    beep.play();
  }, 200);
}

function startScanning() {
  startBtn.style.display = 'none';
  radar.style.display = 'block';
  resetBtn.style.display = 'block';
  scanSound.play();
  active = true;

  quesitoTimer = setInterval(() => {
    spawnQuesito();
  }, 1750);

  animateNeedle();
}

let startTime;
function animateNeedle(timestamp) {
  if (!startTime) startTime = timestamp;
  const elapsed = timestamp - startTime;
  const rotation = (elapsed / 3000) * 360;
  needle.style.transform = `rotate(${rotation}deg) translate(-50%, 0)`;
  requestAnimationFrame(animateNeedle);
}

let alertPlaying = false;

function resetRadar() {
  if (!alertPlaying) {
    // Iniciar sonido alerta
    alertSound.play();
    alertPlaying = true;

    // Mostrar queso grande y detener escaneo
    clearInterval(quesitoTimer);
    const imgIndex = Math.floor(Math.random() * totalQuesos);
    bigQuesito.style.backgroundImage = `url(${imgs[imgIndex]})`;
    bigQuesito.style.display = 'block';
    bigQuesito.style.animation = 'grow 2s forwards';
    scanSound.pause();
    active = false;
  } else {
    // Parar sonido alerta y reiniciar escaneo
    alertSound.pause();
    alertSound.currentTime = 0;
    alertPlaying = false;

    bigQuesito.style.display = 'none';
    radar.style.display = 'block';
    active = true;

    quesitoTimer = setInterval(() => {
      spawnQuesito();
    }, 1750);

    scanSound.play();
  }
}

startBtn.addEventListener('click', startScanning);
resetBtn.addEventListener('click', resetRadar);
</script>
</body>
</html>
