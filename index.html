<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulación de acceso</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f3f6fb, #dfe9f3);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-box {
      background: white;
      width: 340px;
      padding: 28px;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
    }

    h2 {
      margin: 0 0 10px;
      text-align: center;
    }

    .warning {
      background: #fff3cd;
      color: #856404;
      border: 1px solid #ffeeba;
      padding: 10px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-top: 12px;
      margin-bottom: 6px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 10px;
      border: 1px solid #c8c8c8;
      border-radius: 8px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      margin-top: 18px;
      padding: 11px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    .footer {
      text-align: center;
      font-size: 12px;
      color: #666;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>Acceso al correo</h2>
    <div class="warning">
      Simulación educativa: esta página no envía ni almacena credenciales.
    </div>

    <form id="demoForm">
      <label for="email">Correo</label>
      <input type="email" id="email" placeholder="usuario@ejemplo.com" required>

      <label for="password">Contraseña</label>
      <input type="password" id="password" placeholder="••••••••" required>

      <button type="submit">Entrar</button>
    </form>

    <div class="footer">Demo de concienciación de seguridad</div>
  </div>

  <script>
    document.getElementById("demoForm").addEventListener("submit", function(e) {
      e.preventDefault();

      alert("Simulación completada. En un entorno real, nunca introduzcas credenciales sin verificar la web.");
      window.location.href = "https://www.youtube.com";
    });
  </script>
</body>
</html>
